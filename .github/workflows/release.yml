# Builds production zip on version tags (v*). Use when this folder is the repository root.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: SKINALYZE_API_ORIGIN=https://skinalyze.app npm run build
      - name: Zip dist
        run: |
          cd dist
          zip -r ../skinalyze-sync-extension.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: skinalyze-sync-extension.zip
          generate_release_notes: true
